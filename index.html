<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFC単語帳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="branding">
          <span class="brand-prompt" aria-hidden="true">$</span>
          <h1>RFC<span class="brand-accent">単語帳</span></h1>
          <span class="brand-cursor" aria-hidden="true">_</span>
        </div>
        <nav class="nav-tabs" aria-label="メインメニュー">
          <button data-view="home" class="nav-btn is-active">
            <span class="nav-index" aria-hidden="true">00</span>トップ
          </button>
          <button data-view="quiz" class="nav-btn">
            <span class="nav-index" aria-hidden="true">01</span>クイズ
          </button>
          <button data-view="flashcard" class="nav-btn">
            <span class="nav-index" aria-hidden="true">02</span>カード
          </button>
          <button data-view="search" class="nav-btn">
            <span class="nav-index" aria-hidden="true">03</span>一覧
          </button>
        </nav>
      </div>
    </header>

    <main id="app" class="container" aria-live="polite"></main>

    <template id="loading-template">
      <div class="terminal-line">
        <span class="terminal-prompt" aria-hidden="true">$</span>
        <span>データを読み込み中<span class="blink-dots">...</span></span>
      </div>
    </template>

    <template id="error-template">
      <div class="error-box">
        <p class="error-tag">ERR</p>
        <p id="error-message"></p>
        <button id="retry-button" class="btn">再試行</button>
      </div>
    </template>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
