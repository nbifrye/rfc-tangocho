<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFC単語帳</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>RFC単語帳</h1>
      <nav class="nav-tabs" aria-label="メインメニュー">
        <button data-view="home" class="nav-btn is-active">トップ</button>
        <button data-view="quiz" class="nav-btn">クイズ</button>
        <button data-view="flashcard" class="nav-btn">フラッシュカード</button>
        <button data-view="search" class="nav-btn">一覧・検索</button>
      </nav>
    </header>

    <main id="app" class="container" aria-live="polite"></main>

    <template id="loading-template">
      <p class="status">データを読み込み中です...</p>
    </template>

    <template id="error-template">
      <div class="error-box">
        <p id="error-message"></p>
        <button id="retry-button" class="btn">再読み込み</button>
      </div>
    </template>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
